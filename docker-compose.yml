  #     # Inside the container, reach LM Studio via host.docker.internal:
  #     - LM_STUDIO_BASE_URL=http://host.docker.internal:1234/v1
  #     - LM_STUDIO_API_KEY=${LM_STUDIO_API_KEY:-lm-studio}
  #     - LM_STUDIO_MODEL=${QWEN_MODEL_ID:-qwen3.6-35b-a3b-q4_k_m}
  #     # Langfuse tracer config (sends traces to internal Langfuse):
  #     - LANGFUSE_HOST=http://langfuse:3000
  #     - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
  #     - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     - claims-db
  #     - redis
  #
  # claims-db:
  #   image: postgres:16
  #   container_name: shieldpoint-claims-db
  #   networks: [shieldpoint-net]
  #   environment:
  #     - POSTGRES_USER=claims
  #     - POSTGRES_PASSWORD=${CLAIMS_DB_PW}
  #     - POSTGRES_DB=shieldpoint_claims
  #   volumes:
  #     - claims_pgdata:/var/lib/postgresql/data
  #   ports: ["5433:5432"]
  #
  # redis:
  #   image: redis:7.2-alpine
  #   container_name: shieldpoint-redis
  #   networks: [shieldpoint-net]
  #   volumes:
  #     - redis_data:/data
  #   ports: ["6379:6379"]

  # ===========================================================================
  # PROFILE: intake  (SP-203 — Claim Intake Automation with OCR)
  # ===========================================================================
  # Claim intake service: web portal API + IMAP email poller + fax OCR
  # pipeline. Connects to LM Studio for optional LLM-assisted extraction.
  #
  # Built from claim_intake/Dockerfile. Requires tesseract-ocr and
  # poppler-utils on the image.
  # ===========================================================================
  claim-intake:
    build:
      context: ./claim_intake
      dockerfile: Dockerfile
    container_name: shieldpoint-claim-intake
    networks: [shieldpoint-net]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # API server
      - INTAKE_API_HOST=0.0.0.0
      - INTAKE_API_PORT=8001
      # Optional LLM for assisted field extraction (falls back to regex-only)
      - LM_STUDIO_BASE_URL=http://host.docker.internal:1234/v1
      - LM_STUDIO_API_KEY=${LM_STUDIO_API_KEY:-lm-studio}
      - QWEN_MODEL_ID=${QWEN_MODEL_ID:-qwen3.6-35b-a3b-q4_k_m}
      # IMAP polling (disabled by default; enable in prod)
      - INTAKE_IMAP_ENABLED=${INTAKE_IMAP_ENABLED:-false}
      - INTAKE_IMAP_HOST=${INTAKE_IMAP_HOST:-}
      - INTAKE_IMAP_PORT=${INTAKE_IMAP_PORT:-993}
      - INTAKE_IMAP_USER=${INTAKE_IMAP_USER:-}
      - INTAKE_IMAP_PASSWORD=${INTAKE_IMAP_PASSWORD:-}
      - INTAKE_IMAP_MAILBOX=${INTAKE_IMAP_MAILBOX:-INBOX}
      - INTAKE_IMAP_POLL_INTERVAL=${INTAKE_IMAP_POLL_INTERVAL:-60}
    ports:
      - "8001:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health',timeout=2).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles: ["intake"]
    labels:
      - "shieldpoint.project=claims-automation"
      - "shieldpoint.layer=intake"
      - "shieldpoint.service=claim-intake"
